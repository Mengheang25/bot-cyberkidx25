version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_ID=${CHANNEL_ID}
      - CHANNEL_USERNAME=${CHANNEL_USERNAME}
      - ADMIN_ID=${ADMIN_ID}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    env_file:
      - .env
